/**
 * MBA Case Study Platform — Cloudflare Configuration
 *
 * Deploy with: npx wrangler pages deploy dist
 * Local dev:   npx wrangler pages dev dist
 */

name = "mba-case-study"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Asset directory (built Vite app)
assets = {
  directory = "./dist"
}

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "mba-case-study-db"
database_id = "YOUR_DATABASE_ID"

# Environment variables
[vars]
DEFAULT_LLM_PROVIDER = "mock"
LLM_API_URL = "https://api.fabric.io/v1/chat/completions"
LLM_MODEL = "xlarge"

# LLM_API_KEY is set via `wrangler secret put LLM_API_KEY` for server-wide fallback.
# Users can also provide their own API keys per-request via the frontend.

# Observability
[observability]
enabled = true

# Upload source maps for better error tracking
upload_source_maps = true
